name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Build client
        working-directory: apps/client
        env:
          CI: true
        run: npm run build

      - name: Install server dependencies
        working-directory: apps/server
        run: npm ci

      - name: Build server
        working-directory: apps/server
        run: npm run build

  client-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install client deps
        working-directory: apps/client
        run: npm ci

      - name: Run client unit tests (vitest)
        working-directory: apps/client
        env:
          CI: true
        run: npm run test:unit

  server-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install server deps
        working-directory: apps/server
        run: npm ci

      - name: Run server unit tests (vitest)
        working-directory: apps/server
        run: npm run test

      - name: Run server type-check
        working-directory: apps/server
        run: npm run typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Run client lint (if configured)
        working-directory: apps/client
        run: npm run lint

  integration:
    runs-on: ubuntu-latest
    needs: [client-unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Install Playwright Browsers and System Deps
        working-directory: apps/client
        run: npx playwright install --with-deps

      - name: (Fallback) Ensure browsers installed
        working-directory: apps/client
        run: npx playwright install --with-deps

      - name: Run integration tests (Playwright)
        working-directory: apps/client
        env:
          CI: true
        run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    needs: [client-unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Install Playwright Browsers and System Deps
        working-directory: apps/client
        run: npx playwright install --with-deps

      - name: (Fallback) Ensure browsers installed
        working-directory: apps/client
        run: npx playwright install --with-deps

      - name: Run e2e tests (Playwright)
        working-directory: apps/client
        env:
          CI: true
        run: npm run test:e2e
