name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/client/package-lock.json
            apps/server/package-lock.json

      - name: Install Dependencies
        run: |
          cd apps/client && npm ci
          cd ../server && npm ci

      - name: Lint & Type-check
        run: |
          cd apps/client && npm run lint && npm run type-check
          cd ../server && npm run typecheck

      - name: Build Apps
        run: |
          cd apps/client && npm run build
          cd ../server && npm run build

  unit-tests:
    needs: build-and-lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, server]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Run unit tests
        working-directory: apps/${{ matrix.app }}
        env:
          CI: true
        run: |
          if [ "${{ matrix.app }}" = "client" ]; then
            npm run test:unit
          else
            npm run test
          fi

  # E2E & Integration Tests: Most expensive, runs only if unit tests pass.
  playwright-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/client/package-lock.json

      - name: Install client dependencies
        working-directory: apps/client
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        working-directory: apps/client
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies."@playwright/test".version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Browsers & Deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/client
        run: npx playwright install --with-deps

      - name: Install Playwright OS Dependencies (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: apps/client
        run: npx playwright install-deps

      - name: Run Integration Tests
        working-directory: apps/client
        env:
          CI: true
        run: npm run test:integration

      - name: Run E2E Tests
        working-directory: apps/client
        env:
          CI: true
        run: npm run test:e2e
